<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viruez Trading Academy</title>
<style>
  :root{
    --cream:#FBF3E3;
    --ink:#21314D;
    --coral:#FF6B5B;
    --teal:#2EC4B6;
    --sun:#FFC857;
    --grass:#3DA35D;
    --paper:#FFFFFF;
    --line:#E4D9C2;
    --shadow: 0 6px 0 rgba(33,49,77,0.15);
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001s !important; transition-duration:0.001s !important;}
  }
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle, var(--line) 1.4px, transparent 1.4px) 0 0/22px 22px,
      var(--cream);
    color:var(--ink);
    font-family: ui-rounded, "Segoe UI Rounded", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    min-height:100vh;
  }
  h1,h2,h3{font-weight:800; letter-spacing:-0.02em; margin:0;}
  button{font-family:inherit; cursor:pointer;}
  button:focus-visible, [tabindex]:focus-visible{outline:3px solid var(--ink); outline-offset:2px;}
  #app{max-width:720px; margin:0 auto; padding:14px 16px 60px;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;}
  .brand{display:flex; align-items:center; gap:8px;}
  .brand .stamp{
    width:40px;height:40px;border-radius:50%;background:var(--coral);
    display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;
    box-shadow:var(--shadow);
  }
  .brand h1{font-size:19px;}
  .brand p{margin:0;font-size:11px;color:#6b7690;font-weight:600;}
  .starchip{
    background:var(--paper); border:2px solid var(--ink); border-radius:999px;
    padding:6px 12px; font-weight:800; font-size:14px; display:flex; gap:6px; align-items:center;
    box-shadow:var(--shadow);
  }
  .backbtn{
    background:var(--paper); border:2px solid var(--ink); border-radius:12px;
    padding:8px 12px; font-weight:800; box-shadow:var(--shadow); font-size:14px;
  }
  .backbtn:active{transform:translateY(3px); box-shadow:none;}

  /* ---------- Home / map ---------- */
  .hero{text-align:center; margin:6px 0 20px;}
  .hero h2{font-size:24px;}
  .hero p{margin:6px 0 0; color:#5b6580; font-size:14px; font-weight:600;}
  .map{position:relative; padding:10px 0 10px;}
  .pathline{position:absolute; left:50%; top:0; bottom:0; width:6px; transform:translateX(-50%);
    background-image: linear-gradient(var(--ink) 60%, transparent 0%);
    background-position: top; background-size: 6px 18px; background-repeat: repeat-y;
    opacity:0.25; border-radius:3px;}
  .worldnode{position:relative; display:flex; align-items:center; gap:16px; margin:0 0 26px;}
  .worldnode:nth-child(even){flex-direction:row-reverse; text-align:right;}
  .nodebtn{
    width:84px;height:84px;border-radius:50%; flex:none; position:relative;
    border:4px solid var(--ink); font-size:34px; display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow); background:var(--paper);
  }
  .nodebtn.unlocked{background:var(--world-color); }
  .nodebtn.locked{background:#E9E3D4; color:#a39c89; filter:grayscale(1); opacity:0.8;}
  .nodebtn:active.unlocked{transform:translateY(3px); box-shadow:none;}
  .nodecard{flex:1; background:var(--paper); border:2px solid var(--ink); border-radius:16px; padding:10px 14px; box-shadow:var(--shadow);}
  .nodecard h3{font-size:15px;}
  .nodecard .progress{font-size:12px; font-weight:700; color:#6b7690; margin-top:4px;}
  .lockmsg{font-size:11px; color:#a36a3a; font-weight:700; margin-top:4px;}

  /* ---------- Repaso inteligente / método ---------- */
  .reviewcard{
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    background:var(--ink); color:#fff; border-radius:18px; padding:14px 16px; margin-bottom:10px;
    box-shadow:var(--shadow);
  }
  .reviewleft{display:flex; align-items:center; gap:10px;}
  .reviewicon{font-size:28px;}
  .reviewcard h3{font-size:15px; color:#fff;}
  .reviewcard p{margin:2px 0 0; font-size:12px; font-weight:600; color:#cdd3e3;}
  .reviewright{display:flex; align-items:center; gap:10px;}
  .streak{font-weight:800; font-size:14px;}
  .reviewbtn{background:var(--sun); border:none; border-radius:10px; padding:10px 16px; font-weight:800; font-size:13px; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,0.3);}
  .reviewbtn:active{transform:translateY(3px); box-shadow:none;}
  .reviewbtn[disabled]{opacity:0.4; cursor:not-allowed;}
  .infobtn{
    display:block; width:100%; background:transparent; border:2px dashed var(--ink); border-radius:12px;
    padding:8px; font-weight:700; font-size:12px; color:var(--ink); margin-bottom:18px; opacity:0.75;
  }
  .mixedbtn{
    margin-top:10px; background:#fff; border:2px solid var(--ink); border-radius:10px; padding:8px 12px;
    font-weight:800; font-size:12.5px; box-shadow:0 4px 0 rgba(33,49,77,0.15);
  }
  .mixedbtn:active{transform:translateY(3px); box-shadow:none;}

  /* ---------- Pomodoro ---------- */
  .pomocard{
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    background:var(--coral); color:#fff; border:3px solid var(--ink); border-radius:18px; padding:14px 16px; margin-bottom:18px;
    box-shadow:var(--shadow);
  }
  .pomocard h3{font-size:15px; color:#fff;}
  .pomocard p{margin:2px 0 0; font-size:12px; font-weight:600; color:#fff0ee;}
  .pomobtn{background:var(--ink); color:#fff; border:none; border-radius:10px; padding:10px 16px; font-weight:800; font-size:13px; box-shadow:0 4px 0 rgba(0,0,0,0.3);}
  .pomobtn:active{transform:translateY(3px); box-shadow:none;}
  .durationrow{display:flex; gap:10px; justify-content:center; margin:14px 0;}
  .durbtn{flex:1; padding:14px 6px; border-radius:12px; border:2px solid var(--ink); background:#fff; font-weight:800; box-shadow:0 4px 0 rgba(33,49,77,0.15);}
  .durbtn:active{transform:translateY(3px); box-shadow:none;}
  .pomotimerwrap{text-align:center; margin-bottom:10px;}
  #pomotimer{font-size:40px; font-weight:800; letter-spacing:1px;}
  .pomolabel{font-size:12px; font-weight:700; color:#6b7690;}
  .breakwrap{text-align:center; padding:30px 10px;}
  .breakwrap .bigicon{font-size:54px;}
  #breaktimer{font-size:46px; font-weight:800; margin:14px 0;}

  /* ---------- Enséñale a Leo ---------- */
  .teachcard{background:var(--paper); border:3px solid var(--ink); border-radius:18px; padding:18px; box-shadow:var(--shadow); text-align:center;}
  .leoicon{font-size:48px;}
  .teachword{font-size:16px; font-weight:700; margin:6px 0 2px;}
  .teachhint{font-size:12.5px; color:#6b7690; font-weight:600; margin-bottom:10px;}
  .teachcard textarea{width:100%; border:2px solid var(--ink); border-radius:12px; padding:10px; font-family:inherit; font-size:14px; resize:vertical;}
  .leobubble{margin-top:12px; background:var(--sun); border:2px solid var(--ink); border-radius:14px; padding:12px; text-align:left; font-weight:600; font-size:13.5px;}
  .leobubble-err{background:#FBE5E0;}

  /* Gráficos en vivo */
  .chartcontrols{margin-bottom:10px;}
  .chartcontrols select{width:100%; border:2px solid var(--ink); border-radius:12px; padding:10px; font-size:14px; font-family:inherit; background:#fff;}
  .tvchart{height:420px; border:2px solid var(--ink); border-radius:14px; overflow:hidden; background:#131722;}
  .chartnote{font-size:12px; color:#6b7690; font-weight:600; margin-top:10px;}
  .chartfallback{padding:20px; text-align:center; color:#8a93ab; font-weight:700;}

  /* Formularios genéricos (Practica/Diario/Calculadora) */
  .formlabel{display:block; font-size:12px; font-weight:800; margin:10px 0 4px;}
  .teachcard input[type="text"], .teachcard input[type="number"], .teachcard select, .teachcard textarea{
    width:100%; border:2px solid var(--ink); border-radius:10px; padding:9px 10px; font-size:14px; font-family:inherit; background:#fff;
  }
  .chartpreview{width:100%; border-radius:10px; margin-top:8px; border:2px solid var(--ink);}

  /* Diario de trading */
  .journalentry{background:var(--paper); border:2px solid var(--ink); border-radius:14px; padding:12px; margin-bottom:10px; text-align:left; box-shadow:var(--shadow);}
  .je-head{display:flex; gap:8px; align-items:center; flex-wrap:wrap; font-size:14px;}
  .je-dir{font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; background:#eee;}
  .je-result{font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; text-transform:capitalize;}
  .je-r-ganancia{background:#DFF3E6; color:var(--grass);}
  .je-r-pérdida{background:#FBE5E0; color:var(--coral);}
  .je-r-aprendizaje{background:#FFF3D6; color:#9a7b1f;}
  .je-date{font-size:11px; color:#8a93ab; font-weight:700; margin-bottom:6px;}
  .journalentry p{font-size:12.5px; margin:4px 0;}
  .je-delete{margin-top:6px; background:none; border:none; color:var(--coral); font-size:11px; font-weight:700;}

  /* Calculadora de riesgo */
  .rc-result{margin-top:14px; background:rgba(33,49,77,0.05); border-radius:12px; padding:12px;}
  .rc-line{display:flex; justify-content:space-between; font-size:13.5px; padding:4px 0;}

  /* Glosario */
  .glosearch{width:100%; border:2px solid var(--ink); border-radius:12px; padding:12px; font-size:14px; font-family:inherit; margin-bottom:14px;}
  .glomodule{font-size:11px; font-weight:800; color:#8a93ab; text-transform:uppercase; letter-spacing:0.03em; margin:14px 0 6px;}
  .gloterm{background:var(--paper); border:2px solid var(--ink); border-radius:14px; padding:12px; margin-bottom:10px; box-shadow:var(--shadow);}
  .gloterm b{font-size:15px;}
  .gloterm p{font-size:13px; margin:4px 0;}
  .gloex{font-style:italic; color:#6b7690;}

  /* ---------- World screen ---------- */
  .worldbanner{
    background:var(--world-color); border:3px solid var(--ink); border-radius:18px;
    padding:16px 18px; color:#1c2238; margin-bottom:16px; box-shadow:var(--shadow);
  }
  .worldbanner h2{font-size:20px;}
  .worldbanner p{margin:4px 0 0; font-weight:700; font-size:13px; opacity:0.85;}
  .blockcard{
    background:var(--paper); border:2px solid var(--ink); border-radius:16px;
    padding:14px; margin-bottom:14px; box-shadow:var(--shadow); position:relative;
  }
  .blockcard.locked{opacity:0.55;}
  .blockhead{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .blockhead h3{font-size:16px;}
  .blockhead .weeks{font-size:11px; color:#6b7690; font-weight:700;}
  .blockstars{font-size:14px; font-weight:800; white-space:nowrap;}
  .gamerow{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .gamebtn{
    flex:1; min-width:96px; border:2px solid var(--ink); border-radius:12px; padding:10px 6px;
    background:#fff; font-weight:800; font-size:12.5px; text-align:center; box-shadow:0 4px 0 rgba(33,49,77,0.15);
  }
  .gamebtn:active{transform:translateY(3px); box-shadow:none;}
  .gamebtn .ic{font-size:20px; display:block; margin-bottom:2px;}
  .gamebtn[disabled]{opacity:0.4; cursor:not-allowed;}
  .locklabel{position:absolute; top:10px; right:14px; font-size:18px;}

  /* ---------- Game shell ---------- */
  .gameheader{margin-bottom:14px;}
  .gameheader h2{font-size:18px;}
  .bar{height:10px; background:#fff; border:2px solid var(--ink); border-radius:999px; overflow:hidden; margin-top:8px;}
  .bar > div{height:100%; background:var(--teal);}

  /* Flashcards */
  .flashwrap{display:flex; flex-direction:column; align-items:center; gap:16px;}
  .flashcounter{font-weight:800; font-size:13px; color:#6b7690;}
  .flashcard{
    width:100%; max-width:340px; height:420px; perspective:1200px;
  }
  .flashinner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;}
  .flashcard.flipped .flashinner{transform:rotateY(180deg);}
  .flashface{
    position:absolute; inset:0; backface-visibility:hidden; border:3px solid var(--ink); border-radius:20px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:18px; text-align:center;
    box-shadow:var(--shadow);
  }
  .flashfront{background:var(--paper);}
  .flashback{background:var(--sun); transform:rotateY(180deg);}
  .flashfront .en{font-size:28px; font-weight:800;}
  .flashfront .hint{margin-top:10px; font-size:12px; color:#8a93ab; font-weight:700;}
  .flashback .es{font-size:24px; font-weight:800;}
  .flashback .ex{margin-top:10px; font-size:13px; font-weight:600; font-style:italic;}
  .mnemobox{margin-top:10px; font-size:11.5px; font-weight:600; background:rgba(33,49,77,0.08); border-radius:10px; padding:8px 10px; max-width:280px;}
  .mnemobox.mnemo-own{position:relative; padding-right:28px;}
  .mnemoedit{position:absolute; top:4px; right:6px; background:none; border:none; font-size:13px; padding:2px;}
  .mnemobox.mnemo-empty input{width:100%; border:1px solid var(--ink); border-radius:8px; padding:6px 8px; font-size:12px; margin-bottom:6px; font-family:inherit;}
  .mnemobox.mnemo-empty button{width:100%; background:var(--ink); color:#fff; border:none; border-radius:8px; padding:6px; font-weight:800; font-size:11.5px;}

  /* Diagramas ilustrativos */
  .diagrambox{margin-top:10px; background:rgba(33,49,77,0.05); border-radius:12px; padding:8px; max-width:280px;}
  .diagram-svg{width:100%; height:auto; display:block;}
  .diagram-caption{font-size:10px; font-weight:700; color:#8a93ab; text-align:center; margin-top:4px;}

  /* Herramientas (grid) */
  .toolsgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;}
  .toolcard{
    background:var(--paper); border:2px solid var(--ink); border-radius:14px; padding:14px 10px;
    display:flex; flex-direction:column; align-items:center; text-align:center; gap:3px;
    box-shadow:0 4px 0 rgba(33,49,77,0.15); font-weight:800; font-size:12.5px;
  }
  .toolcard:active{transform:translateY(3px); box-shadow:none;}
  .toolcard .ic{font-size:24px;}
  .toolcard .toolsub{font-size:10px; font-weight:600; color:#8a93ab;}

  /* Speaker button */
  .speakbtn{background:var(--ink); color:#fff; border:none; border-radius:50%; width:34px; height:34px; font-size:15px; margin-top:6px; box-shadow:0 3px 0 rgba(0,0,0,0.3);}
  .speakbtn:active{transform:translateY(2px); box-shadow:none;}

  /* Modo Escribir */
  .writecard{background:var(--paper); border:3px solid var(--ink); border-radius:18px; padding:20px; box-shadow:var(--shadow); text-align:center;}
  .writecard .w-es{font-size:24px; font-weight:800; margin:6px 0;}
  .writecard .w-ex{font-size:13px; font-weight:600; font-style:italic; color:#6b7690; margin-bottom:14px;}
  .writecard input{width:100%; border:2px solid var(--ink); border-radius:12px; padding:12px; font-size:18px; text-align:center; font-family:inherit;}
  .writecard input.correct{background:#DFF3E6; border-color:var(--grass);}
  .writecard input.wrong{background:#FBE5E0; border-color:var(--coral);}
  .writefeedback{margin-top:10px; font-weight:800; font-size:14px;}
  .writefeedback.ok{color:var(--grass);}
  .writefeedback.bad{color:var(--coral);}
  .flashbtns{display:flex; gap:10px; width:100%; max-width:340px;}
  .flashbtns button{flex:1; padding:12px; border-radius:12px; border:2px solid var(--ink); font-weight:800; box-shadow:0 4px 0 rgba(33,49,77,0.15);}
  .flashbtns button:active{transform:translateY(3px); box-shadow:none;}
  .btn-know{background:var(--grass); color:#fff;}
  .btn-learn{background:var(--coral); color:#fff;}

  .ratebtns{display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:340px;}
  .ratebtn{padding:12px 6px; border-radius:12px; border:2px solid var(--ink); font-weight:800; font-size:12.5px; box-shadow:0 4px 0 rgba(33,49,77,0.15); color:#fff;}
  .ratebtn:active{transform:translateY(3px); box-shadow:none;}
  .rate-again{background:#D64545;}
  .rate-hard{background:#E08A2E;}
  .rate-good{background:var(--teal);}
  .rate-easy{background:var(--grass);}

  /* Memory match */
  .memgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:8px;}
  .memcard{
    aspect-ratio:1/1; border:2px solid var(--ink); border-radius:10px; background:var(--teal);
    display:flex; align-items:center; justify-content:center; text-align:center; padding:4px;
    font-weight:800; font-size:11.5px; color:#fff; box-shadow:0 3px 0 rgba(33,49,77,0.15);
  }
  .memcard.faceup{background:#fff; color:var(--ink);}
  .memcard.matched{background:var(--sun); color:var(--ink); opacity:0.9;}
  .memstats{display:flex; gap:14px; font-weight:800; font-size:13px; margin-top:10px;}

  /* Quiz */
  .quizcard{background:var(--paper); border:3px solid var(--ink); border-radius:18px; padding:20px; box-shadow:var(--shadow); text-align:center;}
  .quizcard .q-en{font-size:26px; font-weight:800; margin-bottom:4px;}
  .quizcard .q-sub{font-size:12px; color:#8a93ab; font-weight:700; margin-bottom:14px;}
  .options{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
  .optbtn{padding:14px 8px; border:2px solid var(--ink); border-radius:12px; background:#fff; font-weight:800; font-size:14px; box-shadow:0 4px 0 rgba(33,49,77,0.15);}
  .optbtn:active{transform:translateY(3px); box-shadow:none;}
  .optbtn.correct{background:var(--grass); color:#fff;}
  .optbtn.wrong{background:var(--coral); color:#fff;}

  /* Result modal */
  .overlay{position:fixed; inset:0; background:rgba(33,49,77,0.55); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;}
  .resultcard{background:var(--paper); border:3px solid var(--ink); border-radius:22px; padding:28px 22px; text-align:center; max-width:320px; box-shadow:var(--shadow);}
  .resultcard .stars{font-size:38px; margin:10px 0;}
  .resultcard h2{font-size:20px;}
  .resultcard p{font-weight:700; color:#5b6580; font-size:14px;}
  .resultbtn{margin-top:14px; background:var(--ink); color:#fff; border:none; border-radius:12px; padding:12px 20px; font-weight:800; font-size:14px; box-shadow:0 4px 0 rgba(0,0,0,0.25);}
  .resultbtn:active{transform:translateY(3px); box-shadow:none;}

  .empty{text-align:center; color:#8a93ab; font-weight:700; padding:30px 10px;}
  .footnote{text-align:center; font-size:11px; color:#a39c89; font-weight:700; margin-top:24px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============== DATA ============== */
const WORLDS = [
  { id:'t1', name:'Fundamentos', subtitle:'Módulo 1 · Clases 1-3', icon:'🌱', color:'#3DA35D', need:0,
    blocks:[
      { id:'t1b1', title:'Historia del Dinero y el Trading', weeks:'Conceptos base', words:[
        ['Trueque','Intercambiar bienes o servicios directamente, sin usar dinero.','Antes del dinero, la gente cambiaba arroz por frijol: eso era trueque.'],
        ['Patrón oro','Sistema donde el valor del dinero estaba respaldado por oro físico.','Antes de 1971, el dólar estaba ligado al patrón oro.'],
        ['Dinero fiat','Moneda sin respaldo físico; su valor depende de la confianza en quien la emite.','El dólar actual es dinero fiat, no está respaldado por oro.'],
        ['Trading','Comprar y vender activos financieros buscando ganar con la diferencia de precio.','Hacer trading en Forex significa operar pares de divisas.'],
        ['Trader','Persona que compra y vende activos financieros de forma activa.','Un trader profesional sigue un plan, no opera por emoción.'],
        ['Análisis técnico','Estudiar los gráficos de precio para anticipar movimientos futuros.','El análisis técnico usa velas, indicadores y patrones.'],
        ['Análisis fundamental','Estudiar noticias, economía y eventos para entender el valor de un activo.','El análisis fundamental mira tasas de interés e inflación.'],
        ['Forex','Mercado mundial donde se intercambian divisas (pares de monedas).','Forex es el mercado financiero más grande del mundo.'],
        ['Opciones binarias','Contrato donde se predice si el precio sube o baja en un tiempo fijo, con resultado de todo o nada.','En binarias, ganas un porcentaje fijo o pierdes la inversión.'],
        ['Criptomonedas','Monedas digitales que funcionan sin un banco central, basadas en blockchain.','Bitcoin fue la primera criptomoneda.']
      ]},
      { id:'t1b2', title:'Estilos de Trading', weeks:'Conceptos base', words:[
        ['Day trading','Estilo donde se abren y cierran operaciones el mismo día.','El day trader no deja posiciones abiertas durante la noche.'],
        ['Swing trading','Estilo donde las operaciones duran varios días.','El swing trader busca movimientos de varios días o semanas.'],
        ['Scalping','Estilo de operaciones muy rápidas, de segundos o minutos.','El scalper busca pequeñas ganancias muchas veces al día.'],
        ['Posición','Una operación abierta en el mercado, ya sea de compra o de venta.','Tengo una posición abierta en EUR/USD desde ayer.'],
        ['Entrada','El punto exacto donde decides abrir una operación.','Mi entrada fue justo en el soporte.'],
        ['Salida','El punto donde decides cerrar una operación.','Mi salida fue en la resistencia siguiente.'],
        ['Corrientes de trading','Las distintas escuelas o enfoques para analizar el mercado (técnico, fundamental, smart money, etc.).','Cada trader elige la corriente de trading con la que se siente más cómodo.']
      ]}

/* ============== STATE & STORAGE ============== */
let progress = {}; // { blockId: { match: 0-3, quiz: 0-3 } }
let storageReady = false;

function blockProg(id){ const d = progress[id]||{}; return {match:d.match||0, quiz:d.quiz||0, write:d.write||0}; }
function blockStars(id){ const p=blockProg(id); return Math.max(p.match,p.quiz,p.write); }
function worldStars(w){ return w.blocks.reduce((s,b)=>s+blockStars(b.id),0); }
function totalStars(){ return WORLDS.reduce((s,w)=>s+worldStars(w),0); }

/* Almacenamiento universal: usa window.storage si está disponible (dentro de Claude),
   y si no, usa localStorage del navegador (cuando la app corre en GitHub/Vercel). */
async function storageGet(key){
  try{
    if(window.storage){ const r = await window.storage.get(key, false); return r ? r.value : null; }
  }catch(e){}
  try{ return localStorage.getItem('gga_'+key); }catch(e){ return null; }
}
async function storageSet(key, value){
  try{
    if(window.storage){ await window.storage.set(key, value, false); return; }
  }catch(e){}
  try{ localStorage.setItem('gga_'+key, value); }catch(e){}
}

async function loadProgress(){
  try{ const v = await storageGet('gga-progress'); if(v) progress = JSON.parse(v); storageReady = true; }catch(e){ storageReady = false; }
}
async function saveProgress(){ await storageSet('gga-progress', JSON.stringify(progress)); }
function setBlockResult(blockId, kind, stars){
  const p = blockProg(blockId);
  p[kind] = Math.max(p[kind], stars);
  progress[blockId] = p;
  saveProgress();
}

let srsData = {}; // { 'blockId::word': {box, due} }
let meta = { streak:0, lastDate:null };
const BOX_INTERVALS = [1,1,2,4,7,14,30]; // días de espera por caja (índice = caja)

function todayStr(){ return new Date().toISOString().slice(0,10); }
function wordKey(blockId, word){ return blockId+'::'+word[0]; }

async function loadSrs(){ try{ const v = await storageGet('gga-srs'); if(v) srsData = JSON.parse(v); }catch(e){} }
async function saveSrs(){ await storageSet('gga-srs', JSON.stringify(srsData)); }
async function loadMeta(){ try{ const v = await storageGet('gga-meta'); if(v) meta = JSON.parse(v); }catch(e){} }
async function saveMeta(){ await storageSet('gga-meta', JSON.stringify(meta)); }
let mnemoData = {}; // { wordKey: 'texto del truco creado por el usuario' }
async function loadMnemo(){ try{ const v = await storageGet('gga-mnemo'); if(v) mnemoData = JSON.parse(v); }catch(e){} }
async function saveMnemoData(){ await storageSet('gga-mnemo', JSON.stringify(mnemoData)); }
function slug(s){ return s.replace(/[^a-zA-Z0-9]/g,'_'); }
function mnemoBlockHtml(key, builtIn){
  if(builtIn){
    return `<div class="mnemobox mnemo-builtin">💡 <b>Truco:</b> ${builtIn}</div>`;
  }
  const own = mnemoData[key];
  if(own){
    return `<div class="mnemobox mnemo-own">💡 <b>Tu truco:</b> ${own}
      <button class="mnemoedit" onclick="event.stopPropagation(); editMnemo('${slug(key)}')">✏️</button>
    </div>`;
  }
  return `<div class="mnemobox mnemo-empty" onclick="event.stopPropagation();">
    <div style="font-size:11px; font-weight:700; margin-bottom:4px;">💡 Inventa tu truco para no olvidarla:</div>
    <input type="text" id="mi-${slug(key)}" placeholder="Ej: me suena a..." maxlength="80">
    <button onclick="saveMnemo('${key.replace(/'/g,"\\'")}','${slug(key)}')">Guardar</button>
  </div>`;
}
function saveMnemo(key, slugId){
  const input = document.getElementById('mi-'+slugId);
  if(!input || !input.value.trim()) return;
  mnemoData[key] = input.value.trim();
  saveMnemoData();
  render();
}
function editMnemo(slugId){
  const key = Object.keys(mnemoData).find(k=>slug(k)===slugId);
  if(!key) return;
  delete mnemoData[key];
  saveMnemoData();
  render();
}
function isDue(key){ const rec = srsData[key]; if(!rec) return true; return rec.due <= todayStr(); }
function rateWord(key, rating){
  const rec = srsData[key] || {box:0, due: todayStr()};
  let box = rec.box;
  if(rating==='again') box = 1;
  else if(rating==='hard') box = Math.max(1, box);
  else if(rating==='good') box = Math.min(box+1, 6);
  else if(rating==='easy') box = Math.min(box+2, 6);
  const due = new Date(); due.setDate(due.getDate()+BOX_INTERVALS[box]);
  srsData[key] = { box, due: due.toISOString().slice(0,10) };
  saveSrs();
}
function touchStreak(){
  const today = todayStr();
  if(meta.lastDate === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = y.toISOString().slice(0,10);
  meta.streak = (meta.lastDate === yesterday) ? (meta.streak||0)+1 : 1;
  meta.lastDate = today;
  saveMeta();
}
function unlockedBlocks(){
  let res = [];
  WORLDS.forEach(w=>{
    if(totalStars() >= w.need){
      w.blocks.forEach((b,i)=>{
        const prevDone = i===0 || blockStars(w.blocks[i-1].id) >= 1;
        if(prevDone) res.push({world:w, block:b});
      });
    }
  });
  return res;
}
function dueWords(){
  let list = [];
  unlockedBlocks().forEach(({world,block})=>{
    block.words.forEach(word=>{
      const key = wordKey(block.id, word);
      if(isDue(key)) list.push({world, block, word, key});
    });
  });
  return shuffle(list);
}

    const p = blockProg(b.id);
    cards += `
    <div class="blockcard ${prevDone?'':'locked'}">
      ${prevDone?'':'<div class="locklabel">🔒</div>'}
      <div class="blockhead">
        <div><h3>${b.title}</h3><div class="weeks">${b.weeks} · ${b.words.length} palabras</div></div>
        <div class="blockstars">⭐ ${blockStars(b.id)}/3</div>
      </div>
      <div class="gamerow">
        <button class="gamebtn" ${prevDone?'':'disabled'} onclick="startFlash('${w.id}','${b.id}')"><span class="ic">🗂️</span>Tarjetas</button>
        <button class="gamebtn" ${prevDone?'':'disabled'} onclick="startMatch('${w.id}','${b.id}')"><span class="ic">🧩</span>Memoria ${p.match?('· ⭐'+p.match):''}</button>
        <button class="gamebtn" ${prevDone?'':'disabled'} onclick="startQuiz('${w.id}','${b.id}')"><span class="ic">❓</span>Quiz ${p.quiz?('· ⭐'+p.quiz):''}</button>
        <button class="gamebtn" ${prevDone?'':'disabled'} onclick="startWrite('${w.id}','${b.id}')"><span class="ic">✍️</span>Escribir ${p.write?('· ⭐'+p.write):''}</button>
      </div>
    </div>`;
  });
  app.innerHTML = `
    ${topbarHtml(true, "go({screen:'home'})")}
    <div class="worldbanner" style="--world-color:${w.color}; background:${w.color}">
      <h2>${w.icon} ${w.name}</h2>
      <p>${w.subtitle} · ${w.blocks.length} islas de vocabulario</p>
      <button class="mixedbtn" onclick="startMixedQuiz('${w.id}')">🔀 Repaso Mezclado ${blockStars('__mixed__'+w.id)?('· ⭐'+blockStars('__mixed__'+w.id)):''}</button>
    </div>
    ${cards}
  `;
}

function diagramHtml(term){
  const svg = CONCEPT_DIAGRAMS[term];
  if(!svg) return '';
  return `<div class="diagrambox">${svg}<div class="diagram-caption">📐 Ejemplo ilustrativo — entrena tu ojo a reconocer la forma</div></div>`;
}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function speak(text){
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'es-ES';
    u.rate = 0.92;
    speechSynthesis.speak(u);
  }catch(e){}
}
function speakBtn(text){
  return `<button class="speakbtn" onclick="event.stopPropagation(); speak('${text.replace(/'/g,"\\'")}')" aria-label="Escuchar pronunciación">🔊</button>`;
}
function startMatch(worldId, blockId){
  const w = findWorld(worldId), b = findBlock(w, blockId);
  const pairs = shuffle(b.words).slice(0, Math.min(8, b.words.length));
  let cards = [];
  pairs.forEach((pair, idx)=>{
    cards.push({key:idx, text:pair[0], type:'en'});
    cards.push({key:idx, text:pair[1], type:'es'});
  });
  cards = shuffle(cards).map((c,i)=>({...c, id:i, up:false, matched:false}));
  matchState = { worldId, blockId, cards, openIds:[], moves:0, pairsTotal:pairs.length, matchedCount:0, busy:false };
  go({screen:'match'});
}
function renderMatch(app){
  const w = findWorld(matchState.worldId), b = findBlock(w, matchState.blockId);
  const cardsHtml = matchState.cards.map(c=>`
    <button class="memcard ${c.up||c.matched?'faceup':''} ${c.matched?'matched':''}" onclick="flipMatch(${c.id})" ${c.matched?'disabled':''}>
      ${c.up||c.matched ? c.text : '?'}
    </button>`).join('');
  app.innerHTML = `
    ${topbarHtml(true, `go({screen:'world', worldId:'${w.id}'})`)}
    <div class="gameheader">
      <h2>🧩 Memoria · ${b.title}</h2>
      <div class="memstats"><span>🔁 ${matchState.moves} movimientos</span><span>✅ ${matchState.matchedCount}/${matchState.pairsTotal} pares</span></div>
    </div>
    <div class="memgrid">${cardsHtml}</div>
  `;
}
function flipMatch(id){
  if(matchState.busy) return;
  const c = matchState.cards.find(c=>c.id===id);
  if(c.up || c.matched) return;
  c.up = true;
  matchState.openIds.push(id);
  render();
  if(matchState.openIds.length===2){
    matchState.busy = true;
    matchState.moves++;
    const [id1,id2] = matchState.openIds;
    const c1 = matchState.cards.find(c=>c.id===id1), c2 = matchState.cards.find(c=>c.id===id2);
    setTimeout(()=>{
      if(c1.key===c2.key && c1.type!==c2.type){
        c1.matched=true; c2.matched=true; matchState.matchedCount++;
      } else {
        c1.up=false; c2.up=false;
      }
      matchState.openIds = [];
      matchState.busy = false;
      render();
      if(matchState.matchedCount === matchState.pairsTotal){
        const ideal = matchState.pairsTotal*2;
        let stars = matchState.moves<=ideal+2 ? 3 : matchState.moves<=ideal+6 ? 2 : 1;
        setBlockResult(matchState.blockId, 'match', stars);
        setTimeout(()=>showResult('¡Pares completados!', '🧩✅', `Lo lograste en ${matchState.moves} movimientos.`, `go({screen:'world', worldId:'${matchState.worldId}'})`, stars), 300);
      }
    }, 700);
  }
}

/* ============== QUIZ ============== */
let quizState = null;
function startQuiz(worldId, blockId){
  const w = findWorld(worldId), b = findBlock(w, blockId);
  const pool = shuffle(b.words);
  const qCount = Math.min(8, pool.length);
  const questions = pool.slice(0, qCount).map(word=>{
    let distractors = shuffle(b.words.filter(x=>x[0]!==word[0])).slice(0,3).map(x=>x[1]);
    const options = shuffle([word[1], ...distractors]);
    return { word, options, answered:false, picked:null };
  });
  quizState = { worldId, blockId, questions, i:0, correct:0, title:b.title, mixed:false };
  go({screen:'quiz'});
}
function startMixedQuiz(worldId){
  const w = findWorld(worldId);
  const blocksUnlocked = w.blocks.filter((b,i)=> i===0 || blockStars(w.blocks[i-1].id)>=1);
  let pool = [];
  blocksUnlocked.forEach(b=> b.words.forEach(word=> pool.push(word)));
  pool = shuffle(pool);
  const qCount = Math.min(12, pool.length);
  const questions = pool.slice(0, qCount).map(word=>{
    let candidates = pool.filter(x=>x[0]!==word[0] && x[1]!==word[1]);
    let distractors = shuffle(candidates).slice(0,3).map(x=>x[1]);
    const options = shuffle([word[1], ...distractors]);
    return { word, options, answered:false, picked:null };
  });
  quizState = { worldId, blockId:'__mixed__'+worldId, questions, i:0, correct:0, title:'Repaso Mezclado', mixed:true };
  go({screen:'quiz'});
}
function renderQuiz(app){
  const w = findWorld(quizState.worldId);
  const q = quizState.questions[quizState.i];
  const pct = Math.round(quizState.i/quizState.questions.length*100);
  const opts = q.options.map(o=>{
    let cls='';
    if(q.answered){
      if(o===q.word[1]) cls='correct';
      else if(o===q.picked) cls='wrong';
    }
    return `<button class="optbtn ${cls}" ${q.answered?'disabled':''} onclick="answerQuiz('${o.replace(/'/g,"\\'")}')">${o}</button>`;
  }).join('');
  app.innerHTML = `
    ${topbarHtml(true, `go({screen:'world', worldId:'${w.id}'})`)}
    <div class="gameheader">
      <h2>❓ ${quizState.mixed?'🔀 ':''}Quiz · ${quizState.title}</h2>
      <div class="bar"><div style="width:${pct}%"></div></div>
    </div>
    <div class="quizcard">
      <div class="q-sub">Pregunta ${quizState.i+1} de ${quizState.questions.length} · ¿Qué significa...?</div>
      <div class="q-en">${q.word[0]}</div>${speakBtn(q.word[0])}
      <div class="options">${opts}</div>
    </div>
  `;
}
function answerQuiz(opt){
  const q = quizState.questions[quizState.i];
  if(q.answered) return;
  q.answered = true; q.picked = opt;
  if(opt === q.word[1]) quizState.correct++;
  render();
  setTimeout(()=>{
    if(quizState.i < quizState.questions.length-1){
      quizState.i++; render();
    } else {
      const pct = quizState.correct/quizState.questions.length*100;
      const stars = pct>=90?3:pct>=70?2:pct>=50?1:0;
      setBlockResult(quizState.blockId, 'quiz', stars);
      showResult('¡Quiz terminado!', stars>=2?'🏆':'📚', `Respondiste bien ${quizState.correct} de ${quizState.questions.length}.`, `go({screen:'world', worldId:'${quizState.worldId}'})`, stars);
    }
  }, 900);
}

/* ============== POMODORO ============== */
let pomoState = null;
let pomoTimerId = null;
function formatTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function allWordsPool(){
  let pool = [];
  unlockedBlocks().forEach(({world,block})=>{
    block.words.forEach(word=> pool.push({world, block, word}));
  });
  return pool.length ? pool : (WORLDS[0].blocks[0].words.map(word=>({world:WORLDS[0], block:WORLDS[0].blocks[0], word})));
}
function startPomodoro(minutes){
  const due = dueWords();
  const pool = due.length ? due : shuffle(allWordsPool());
  pomoState = { totalSeconds: minutes*60, remaining: minutes*60, pool: shuffle(pool), i:0, flipped:false, reviewedCount:0 };
  go({screen:'pomodoro'});
  clearInterval(pomoTimerId);
  pomoTimerId = setInterval(tickPomodoro, 1000);
}
function tickPomodoro(){
  if(!pomoState) { clearInterval(pomoTimerId); return; }
  pomoState.remaining--;
  const t = document.getElementById('pomotimer');
  if(t) t.textContent = formatTime(Math.max(0,pomoState.remaining));
  if(pomoState.remaining <= 0){
    clearInterval(pomoTimerId);
    finishPomodoro();
  }
}
function stopPomodoroAndGoHome(){
  clearInterval(pomoTimerId);
  pomoState = null;
  go({screen:'home'});
}
function renderPomodoro(app){
  const item = pomoState.pool[pomoState.i % pomoState.pool.length];
  const word = item.word;
  app.innerHTML = `
    ${topbarHtml(true, "stopPomodoroAndGoHome()")}
    <div class="gameheader">
      <div class="pomotimerwrap">
        <div id="pomotimer">${formatTime(pomoState.remaining)}</div>
        <div class="pomolabel">🍅 Sesión enfocada · ${pomoState.reviewedCount} palabra(s) repasadas</div>
      </div>
    </div>
    <div class="flashwrap">
      <div class="flashcounter">${item.block.title}</div>
      <div class="flashcard ${pomoState.flipped?'flipped':''}" onclick="flipPomo()">
        <div class="flashinner">
          <div class="flashface flashfront"><div class="en">${word[0]}</div>${speakBtn(word[0])}<div class="hint">Toca para ver la definición 👆</div></div>
          <div class="flashface flashback"><div class="es">${word[1]}</div><div class="ex">“${word[2]}”</div>${diagramHtml(word[0])}</div>
        </div>
      </div>
      <div class="flashbtns">
        <button class="btn-learn" onclick="event.stopPropagation(); nextPomo('again')">🔁 Repasar más</button>
        <button class="btn-know" onclick="event.stopPropagation(); nextPomo('good')">✅ ¡Ya lo sé!</button>
      </div>
    </div>
  `;
}
function flipPomo(){ pomoState.flipped = !pomoState.flipped; render(); }
function nextPomo(rating){
  const item = pomoState.pool[pomoState.i % pomoState.pool.length];
  rateWord(wordKey(item.block.id, item.word), rating);
  pomoState.reviewedCount++;
  pomoState.i++;
  if(pomoState.i >= pomoState.pool.length){ pomoState.pool = shuffle(pomoState.pool); pomoState.i = 0; }
  pomoState.flipped = false;
  render();
}
function finishPomodoro(){
  const count = pomoState ? pomoState.reviewedCount : 0;
  touchStreak();
  pomoState = null;
  const overlay = el(`
    <div class="overlay">
      <div class="resultcard">
        <div style="font-size:40px">🍅✅</div>
        <h2>¡Sesión completa!</h2>
        <p>Repasaste ${count} palabra(s) sin distracciones. ¡Excelente enfoque!</p>
        <button class="resultbtn" style="width:100%; margin-bottom:8px;" id="breakYes">☕ Tomar descanso de 5 min</button>
        <button class="resultbtn" style="width:100%; background:#fff; color:var(--ink); border:2px solid var(--ink);" id="breakNo">🏠 Volver al inicio</button>
      </div>
    </div>`);
  overlay.querySelector('#breakYes').onclick = ()=>{ overlay.remove(); startBreak(); };
  overlay.querySelector('#breakNo').onclick = ()=>{ overlay.remove(); go({screen:'home'}); };
  document.body.appendChild(overlay);
}
function startBreak(){
  pomoState = { remaining: 5*60 };
  go({screen:'break'});
  clearInterval(pomoTimerId);
  pomoTimerId = setInterval(tickBreak, 1000);
}
function tickBreak(){
  if(!pomoState){ clearInterval(pomoTimerId); return; }
  pomoState.remaining--;
  const t = document.getElementById('breaktimer');
  if(t) t.textContent = formatTime(Math.max(0,pomoState.remaining));
  if(pomoState.remaining <= 0){ clearInterval(pomoTimerId); pomoState=null; go({screen:'home'}); }
}

let writeState = null;
function normalizeAnswer(s){
  return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'');
}
function startWrite(worldId, blockId){
  const w = findWorld(worldId), b = findBlock(w, blockId);
  const words = shuffle(b.words).slice(0, Math.min(8, b.words.length));
  writeState = { worldId, blockId, words, i:0, correctCount:0, checked:false, wasCorrect:false };
  go({screen:'write'});
}
function renderWrite(app){
  const w = findWorld(writeState.worldId), b = findBlock(w, writeState.blockId);
  const word = writeState.words[writeState.i];
  const pct = Math.round(writeState.i/writeState.words.length*100);
  const inputCls = writeState.checked ? (writeState.wasCorrect ? 'correct' : 'wrong') : '';
  app.innerHTML = `
    ${topbarHtml(true, `go({screen:'world', worldId:'${w.id}'})`)}
    <div class="gameheader">
      <h2>✍️ Escribir · ${b.title}</h2>
      <div class="bar"><div style="width:${pct}%"></div></div>
    </div>
    <div class="writecard">
      <div class="w-sub" style="font-size:12px; color:#8a93ab; font-weight:700;">Concepto ${writeState.i+1} de ${writeState.words.length} · ¿Cómo se llama este concepto?</div>
      <div class="w-es">${word[1]}</div>
      <div class="w-ex">“${word[2].replace(new RegExp(word[0],'i'), '_____')}”</div>
      <input type="text" id="write-input" class="${inputCls}" autocomplete="off" autocapitalize="off"
        placeholder="Escribe el término..." ${writeState.checked?'disabled':''}
        onkeydown="if(event.key==='Enter') checkWrite();">
      ${writeState.checked ? `<div class="writefeedback ${writeState.wasCorrect?'ok':'bad'}">${writeState.wasCorrect?'✅ ¡Correcto!':'❌ Era: '+word[0]}</div>` : ''}
      <div style="margin-top:14px; display:flex; gap:10px;">
        ${writeState.checked
          ? `<button class="resultbtn" style="flex:1;" onclick="nextWrite()">Siguiente →</button>`
          : `<button class="resultbtn" style="flex:1;" onclick="checkWrite()">Comprobar</button>`}
        ${speakBtn(word[0])}
      </div>
    </div>
  `;
  const inp = document.getElementById('write-input');
  if(inp && !writeState.checked) inp.focus();
}
function checkWrite(){
  const word = writeState.words[writeState.i];
  const input = document.getElementById('write-input');
  const val = input ? input.value : '';
  const ok = normalizeAnswer(val) === normalizeAnswer(word[0]);
  writeState.checked = true;
  writeState.wasCorrect = ok;
  if(ok) writeState.correctCount++;
  render();
}
function nextWrite(){
  if(writeState.i < writeState.words.length-1){
    writeState.i++; writeState.checked=false; writeState.wasCorrect=false; render();
  } else {
    const pct = writeState.correctCount/writeState.words.length*100;
    const stars = pct>=90?3:pct>=70?2:pct>=50?1:0;
    setBlockResult(writeState.blockId, 'write', stars);
    showResult('¡Escritura completa!', stars>=2?'✍️🏆':'✍️📚', `Escribiste bien ${writeState.correctCount} de ${writeState.words.length}.`, `go({screen:'world', worldId:'${writeState.worldId}'})`, stars);
  }
}

function handleChartImage(event){
  const file = event.target.files[0];
  if(!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = (e)=>{
    img.onload = ()=>{
      const maxW = 800;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*scale;
      canvas.height = img.height*scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      chartPracticeState.imageData = dataUrl.split(',')[1];
      chartPracticeState.imageType = 'image/jpeg';
      chartPracticeState.feedback = null;
      chartPracticeState.error = null;
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
async function submitChartPractice(){
  const conceptSel = document.getElementById('chart-concept-select');
  const reasoningInput = document.getElementById('chart-reasoning-input');
  const concept = conceptSel ? conceptSel.value : '';
  const reasoning = reasoningInput ? reasoningInput.value.trim() : '';
  if(!reasoning){ chartPracticeState.error = 'Escribe tu análisis antes de enviar.'; render(); return; }
  chartPracticeState.concept = concept;
  chartPracticeState.reasoning = reasoning;
  chartPracticeState.loading = true;
  chartPracticeState.feedback = null;
  chartPracticeState.error = null;
  render();
  try{
    const response = await fetch("/api/chart-feedback", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        concept, reasoning,
        imageData: chartPracticeState.imageData,
        imageType: chartPracticeState.imageType
      })
    });
    const data = await response.json();
    if(data.error) throw new Error(data.error);
    chartPracticeState.feedback = data.text || 'El Oso no encontró nada que decir, intenta de nuevo.';
  }catch(e){
    chartPracticeState.error = 'El Oso no pudo revisar tu gráfico ahora mismo. Revisa tu conexión e intenta de nuevo.';
  }
  chartPracticeState.loading = false;
  render();
}

      ${e.reflection ? `<p><b>Reflexión:</b> ${e.reflection}</p>` : ''}
      ${e.aiFeedback ? `<div class="leobubble">🐻 ${e.aiFeedback}</div>` : `<button class="resultbtn" style="width:100%; margin-top:6px;" onclick="getJournalFeedback('${e.id}')">${journalFeedbackFor===e.id?'🐻 Pensando...':'Pedir reflexión al Oso 🐻'}</button>`}
      <button class="je-delete" onclick="deleteJournalEntry('${e.id}')">🗑️ Borrar</button>
    </div>`).join('');
  app.innerHTML = `
    ${topbarHtml(true, "go({screen:'home'})")}
    <div class="gameheader"><h2>📓 Diario de Trading</h2></div>
    <div class="teachcard" style="text-align:left; margin-bottom:16px;">
      <p class="teachhint" style="margin-bottom:10px;">Registra tus operaciones de práctica (usa el paper trading gratuito de TradingView, sin dinero real) y reflexiona sobre tu razonamiento, no solo el resultado.</p>
      <label class="formlabel">Activo</label>
      <input type="text" id="j-symbol" placeholder="Ej: EUR/USD" value="${d.symbol}">
      <label class="formlabel">Dirección</label>
      <select id="j-direction"><option value="compra" ${d.direction==='compra'?'selected':''}>Compra</option><option value="venta" ${d.direction==='venta'?'selected':''}>Venta</option></select>
      <label class="formlabel">¿Por qué entraste?</label>
      <textarea id="j-entry" rows="2" placeholder="Ej: Vi una zona de demanda en soporte...">${d.reasonEntry}</textarea>
      <label class="formlabel">¿Por qué saliste?</label>
      <textarea id="j-exit" rows="2" placeholder="Ej: Llegó a mi take profit / toqué stop loss...">${d.reasonExit}</textarea>
      <label class="formlabel">Resultado</label>
      <select id="j-result">
        <option value="ganancia" ${d.result==='ganancia'?'selected':''}>Ganancia</option>
        <option value="pérdida" ${d.result==='pérdida'?'selected':''}>Pérdida</option>
        <option value="aprendizaje" ${d.result==='aprendizaje'?'selected':''}>Empate / aprendizaje</option>
      </select>
      <button class="pomobtn" style="width:100%; margin-top:10px; background:var(--ink);" onclick="addJournalEntry()">Guardar en el diario</button>
    </div>
    ${journalEntries.length ? list : '<p class="empty">Todavía no tienes operaciones registradas. ¡Empieza con la primera!</p>'}
  `;
}
function addJournalEntry(){
  const symbol = document.getElementById('j-symbol').value.trim() || 'Sin nombre';
  const direction = document.getElementById('j-direction').value;
  const reasonEntry = document.getElementById('j-entry').value.trim();
  const reasonExit = document.getElementById('j-exit').value.trim();
  const result = document.getElementById('j-result').value;
  if(!reasonEntry){ return; }
  journalEntries.push({
    id: 'j'+Date.now(), symbol, direction, reasonEntry, reasonExit, result,
    date: new Date().toLocaleDateString('es-ES', {day:'numeric', month:'short', year:'numeric'}),
    aiFeedback: null
  });
  journalDraft = { symbol:'', direction:'compra', reasonEntry:'', reasonExit:'', result:'aprendizaje', reflection:'' };
  saveJournalData();
  render();
}
function deleteJournalEntry(id){
  journalEntries = journalEntries.filter(e=>e.id!==id);
  saveJournalData();
  render();
}
async function getJournalFeedback(id){
  const entry = journalEntries.find(e=>e.id===id);
  if(!entry) return;
  journalFeedbackFor = id;
  render();
  try{
    const response = await fetch("/api/leo", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        concept: 'Diario de trading: '+entry.symbol+' ('+entry.direction+', resultado: '+entry.result+')',
        definition: '',
        sentence: 'Entré porque: '+entry.reasonEntry+'. Salí porque: '+entry.reasonExit
      })
    });
    const data = await response.json();
    if(data.error) throw new Error(data.error);
    entry.aiFeedback = data.text || 'El Oso no encontró nada que decir.';
  }catch(e){
    entry.aiFeedback = 'El Oso no pudo revisar esta entrada ahora mismo.';
  }
  journalFeedbackFor = null;
  saveJournalData();
  render();
}

/* ============== CALCULADORA DE GESTIÓN DE RIESGO ============== */
function renderRiskCalc(app){
  app.innerHTML = `
    ${topbarHtml(true, "go({screen:'home'})")}
    <div class="gameheader"><h2>🧮 Calculadora de Gestión de Riesgo</h2></div>
    <div class="teachcard" style="text-align:left;">
      <p class="teachhint" style="margin-bottom:10px;">Calcula cuánto deberías arriesgar por operación, según tu propio plan de trading. Esto es solo matemática de gestión de riesgo — no es una recomendación de inversión.</p>
      <label class="formlabel">Capital total de tu cuenta ($)</label>
      <input type="number" id="rc-capital" placeholder="Ej: 1000" oninput="calcRisk()">
      <label class="formlabel">% que estás dispuesto a arriesgar por operación</label>
      <input type="number" id="rc-percent" placeholder="Ej: 1" value="1" oninput="calcRisk()">
      <label class="formlabel">Distancia a tu stop loss (en pips o puntos)</label>
      <input type="number" id="rc-stopdistance" placeholder="Ej: 20" oninput="calcRisk()">
      <label class="formlabel">Valor de 1 pip/punto por lote estándar ($)</label>
      <input type="number" id="rc-pipvalue" placeholder="Ej: 10" value="10" oninput="calcRisk()">
      <div id="rc-result" class="rc-result"></div>
    </div>
  `;
  calcRisk();
}
function calcRisk(){
  const capital = parseFloat(document.getElementById('rc-capital').value) || 0;
  const percent = parseFloat(document.getElementById('rc-percent').value) || 0;
  const stopDist = parseFloat(document.getElementById('rc-stopdistance').value) || 0;
  const pipValue = parseFloat(document.getElementById('rc-pipvalue').value) || 0;
  const riskAmount = capital * (percent/100);
  const resultEl = document.getElementById('rc-result');
  if(capital<=0 || stopDist<=0 || pipValue<=0){
    resultEl.innerHTML = '<p style="color:#8a93ab; font-weight:700;">Completa todos los campos para ver el cálculo.</p>';
    return;
  }
  const lots = riskAmount / (stopDist * pipValue);
  resultEl.innerHTML = `
    <div class="rc-line"><span>Dinero que arriesgas en esta operación:</span><b>$${riskAmount.toFixed(2)}</b></div>
    <div class="rc-line"><span>Tamaño de posición sugerido:</span><b>${lots.toFixed(2)} lotes</b></div>
    <p style="font-size:11px; color:#8a93ab; margin-top:8px;">Esto solo calcula el tamaño según TU riesgo definido — no predice si la operación va a ganar o perder.</p>
  `;
}

/* ============== GLOSARIO COMPLETO (buscable) ============== */
function renderGlossary(app){
  app.innerHTML = `
    ${topbarHtml(true, "go({screen:'home'})")}
    <div class="gameheader"><h2>📖 Glosario Completo</h2></div>
    <input type="text" id="glossary-search" placeholder="Buscar un término..." oninput="filterGlossary()" class="glosearch">
    <div id="glossary-list"></div>
  `;
  filterGlossary();
}
function filterGlossary(){
  const q = (document.getElementById('glossary-search').value || '').toLowerCase();
  let html = '';
  WORLDS.forEach(w=>{
    w.blocks.forEach(b=>{
      const matches = b.words.filter(word => word[0].toLowerCase().includes(q) || word[1].toLowerCase().includes(q));
      if(matches.length){
        html += `<div class="glomodule">${w.icon} ${w.name} · ${b.title}</div>`;
        matches.forEach(word=>{
          html += `<div class="gloterm"><b>${word[0]}</b>${speakBtn(word[0])}<p>${word[1]}</p><p class="gloex">“${word[2]}”</p>${diagramHtml(word[0])}</div>`;
        });
      }
    });
  });
  document.getElementById('glossary-list').innerHTML = html || '<p class="empty">No se encontraron términos.</p>';
}

/* ============== RESULT MODAL ============== */
function showResult(title, icon, msg, backCall, stars){
  const starsHtml = stars!==undefined ? `<div class="stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>` : '';
  const overlay = el(`
    <div class="overlay">
      <div class="resultcard">
        <div style="font-size:40px">${icon}</div>
        <h2>${title}</h2>
        ${starsHtml}
        <p>${msg}</p>
        <button class="resultbtn">Continuar</button>
      </div>
    </div>`);
  overlay.querySelector('.resultbtn').onclick = ()=>{ overlay.remove(); eval(backCall); };
  document.body.appendChild(overlay);
}

/* ============== INIT ============== */
(async function init(){
  await Promise.all([loadProgress(), loadSrs(), loadMeta(), loadMnemo(), loadJournal()]);
  render();
})();
</script>
